<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matuclub</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- HOME -->
  <div id="home" class="view active">
    <div class="hero">
      <!-- Logo: escudo con llama en celeste, fiel al estilo de la imagen -->
      <div class="matu-logo">
        <svg viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg" width="90" height="90">
          <!-- Sombra exterior negra -->
          <path d="M50 2 L96 21 L96 67 Q96 96 50 112 Q4 96 4 67 L4 21 Z" fill="#000" opacity="0.85"/>
          <!-- Capa exterior celeste oscuro -->
          <path d="M50 6 L92 24 L92 67 Q92 93 50 108 Q8 93 8 67 L8 24 Z" fill="#0099cc"/>
          <!-- Capa media celeste medio -->
          <path d="M50 11 L87 28 L87 67 Q87 89 50 103 Q13 89 13 67 L13 28 Z" fill="#00b4e8"/>
          <!-- Capa interior celeste claro -->
          <path d="M50 16 L82 32 L82 67 Q82 85 50 98 Q18 85 18 67 L18 32 Z" fill="#0077aa"/>
          <!-- Punta inferior del escudo (chevron negro) -->
          <path d="M8 67 Q8 93 50 108 Q92 93 92 67 L87 67 Q87 89 50 103 Q13 89 13 67 Z" fill="#000" opacity="0.3"/>
          <!-- Llama blanca -->
          <path d="M50 26
                   C50 26 65 37 65 51
                   C65 58 61 63 56 65
                   C59 60 57 55 53 52
                   C53 58 50 63 47 65
                   C43 62 35 56 35 49
                   C35 41 42 34 42 34
                   C42 40 45 43 48 44
                   C46 40 46 33 50 26 Z"
                fill="white"/>
          <!-- Punto naranja interior de la llama -->
          <path d="M50 40
                   C50 40 56 46 56 52
                   C56 55 54 57 52 58
                   C53 56 52 53 50 52
                   C50 55 48 57 47 58
                   C44 56 44 52 44 50
                   C44 46 48 42 48 42
                   C48 44 49 46 50 46
                   C49 44 49 41 50 40 Z"
                fill="#00ccff" opacity="0.4"/>
        </svg>
      </div>
      <div class="badge">MATUCLUB · BRAWL STARS</div>
      <h1>Matu<span>club</span></h1>
      <p class="subtitle">Página oficial de Matuclub, el mejor club de Uruguay</p>
      <nav class="nav-cards">
        <button class="nav-card" onclick="showView('prestige')">
          <div class="nav-card-icon">
            <img src="https://cdn.brawlify.com/rank/Silver_III.png" 
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"
                 width="28" height="28" alt="prestige"/>
            <span style="display:none;font-size:22px">🏆</span>
          </div>
          <div class="nav-card-body">
            <span class="nav-card-title">Top Prestige</span>
            <span class="nav-card-desc">Ranking del club por prestige</span>
          </div>
          <div class="nav-card-arrow">→</div>
        </button>
        <button class="nav-card" onclick="showView('player')">
          <div class="nav-card-icon">
            <img src="https://cdn.brawlify.com/profile/28000000.png"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"
                 width="28" height="28" alt="player"/>
            <span style="display:none;font-size:22px">👤</span>
          </div>
          <div class="nav-card-body">
            <span class="nav-card-title">Buscar Jugador</span>
            <span class="nav-card-desc">Stats, historial y brawlers</span>
          </div>
          <div class="nav-card-arrow">→</div>
        </button>
        <button class="nav-card" onclick="showView('brawler')">
          <div class="nav-card-icon">
            <img src="https://cdn.brawlify.com/brawlers/borderless/16000000.png"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"
                 width="28" height="28" alt="brawler"/>
            <span style="display:none;font-size:22px">🤖</span>
          </div>
          <div class="nav-card-body">
            <span class="nav-card-title">Top Brawler</span>
            <span class="nav-card-desc">Mejores jugadores por brawler</span>
          </div>
          <div class="nav-card-arrow">→</div>
        </button>
      </nav>
    </div>
  </div>

  <!-- TOP PRESTIGE -->
  <div id="prestige" class="view">
    <header class="page-header">
      <button class="back-btn" onclick="showView('home')"><span>←</span> Volver</button>
      <h2>
        <img src="https://cdn.brawlify.com/rank/Silver_III.png" class="header-icon"
             onerror="this.style.display='none'" width="28" height="28" alt=""/>
        Top Prestige
      </h2>
    </header>
    <div class="content-area">
      <div id="prestigeList"><div class="loading">Cargando ranking…</div></div>
    </div>
  </div>

  <!-- PLAYER -->
  <div id="player" class="view">
    <header class="page-header">
      <button class="back-btn" onclick="showView('home')"><span>←</span> Volver</button>
      <h2>
        <img src="https://cdn.brawlify.com/profile/28000000.png" class="header-icon"
             onerror="this.style.display='none'" width="28" height="28" alt=""/>
        Buscar Jugador
      </h2>
    </header>
    <div class="content-area">
      <div class="search-bar">
        <input id="playerTag" placeholder="#PLAYERTAG" />
        <button class="search-btn" onclick="fetchPlayer()">Buscar</button>
      </div>
      <div id="playerProfile"></div>
      <div id="chartSection" style="display:none">
        <div class="section-header">
          <h3 class="section-title">Progreso</h3>
          <div class="tab-group">
            <button class="tab active" onclick="switchTab('trophies',this)">Copas</button>
            <button class="tab" onclick="switchTab('wins3v3',this)">Victorias 3v3</button>
            <button class="tab" onclick="switchTab('winsSolo',this)">Solo</button>
            <button class="tab" onclick="switchTab('prestigeLvl',this)">Prestige</button>
          </div>
        </div>
        <div class="chart-card">
          <canvas id="chart"></canvas>
        </div>
      </div>
      <div id="brawlersSection" style="display:none">
        <div class="section-header">
          <h3 class="section-title">Top 10 Brawlers</h3>
        </div>
        <div id="brawlerGrid" class="brawler-grid"></div>
      </div>
    </div>
  </div>

  <!-- BRAWLER TOP -->
  <div id="brawler" class="view">
    <header class="page-header">
      <button class="back-btn" onclick="showView('home')"><span>←</span> Volver</button>
      <h2>
        <img src="https://cdn.brawlify.com/brawlers/borderless/16000000.png" class="header-icon"
             onerror="this.style.display='none'" width="28" height="28" alt=""/>
        Top Brawler
      </h2>
    </header>
    <div class="content-area">
      <div class="search-bar">
        <input id="brawlerName" placeholder="Nombre del brawler…" />
        <button class="search-btn" onclick="fetchBrawler()">Buscar</button>
      </div>
      <div id="brawlerList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
