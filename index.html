<!DOCTYPE html>
<html>
<head>
  <title>Matuclub Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- HOME -->
<div id="home" class="view active">
  <div class="hero">
    <img src="logo.png" class="logo"> <!-- después ponés tu logo -->
    <h1>Matuclub Tracker</h1>

    <div class="buttons">
      <button onclick="showView('prestige')">🏆 Top Prestige</button>
      <button onclick="showView('player')">👤 Buscar Jugador</button>
      <button onclick="showView('brawler')">🤖 Top Brawler</button>
    </div>
  </div>
</div>

<!-- TOP PRESTIGE -->
<div id="prestige" class="view">
  <h2>🏆 Top Prestige</h2>
  <button onclick="showView('home')">⬅ Volver</button>
  <div id="prestigeList"></div>
</div>

<!-- PLAYER -->
<div id="player" class="view">
  <h2>👤 Buscar Jugador</h2>
  <button onclick="showView('home')">⬅ Volver</button>

  <input id="playerTag" placeholder="Player tag">
  <button onclick="fetchPlayer()">Buscar</button>

  <div id="playerData"></div>
  <canvas id="chart"></canvas>
</div>

<!-- BRAWLER -->
<div id="brawler" class="view">
  <h2>🤖 Top Brawler</h2>
  <button onclick="showView('home')">⬅ Volver</button>

  <input id="brawlerName" placeholder="Nombre del brawler">
  <button onclick="fetchBrawler()">Buscar</button>

  <div id="brawlerList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
